name: K100-탐욕공포지수 업데이트 (KOSPI100)

on:
  workflow_dispatch:   # 수동 실행 전용

permissions:
  contents: write

jobs:
  update-k100-index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KRX OpenAPI KOSPI 시리즈 응답 구조 진단
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json
          from pykrx_openapi import KRXOpenAPI
          auth_key = os.environ.get("KRX_AUTH_KEY", "")
          if not auth_key:
              print("[진단] KRX_AUTH_KEY 없음 — 건너뜀")
          else:
              try:
                  api = KRXOpenAPI(api_key=auth_key)
                  result = api.get_kospi_daily_trade("20260530")
                  records = result.get("OutBlock_1", [])
                  print(f"[진단] 응답 레코드 수: {len(records)}")
                  if records:
                      print(f"[진단] 필드 목록: {list(records[0].keys())}")
                      # 지수명 필드 찾기
                      for r in records[:5]:
                          print(f"  {r}")
                      # KOSPI100 포함 여부 확인
                      idx_names = [str(r.get(k,"")) for r in records for k in r if "nm" in k.lower() or "name" in k.lower() or "idx" in k.lower()]
                      k100_found = any("100" in v or "KOSPI100" in v for v in idx_names)
                      print(f"[진단] KOSPI100 포함 여부: {k100_found}")
              except Exception as e:
                  print(f"[진단] KRX OpenAPI 오류: {e}")
          EOF

      - name: K100-탐욕공포지수 산출 (KOSPI100)
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python k_fear_greed_k100.py

      - name: CSV 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f "k_fear_greed_result_k100.csv" ] && git add "k_fear_greed_result_k100.csv" || echo "건너뜀 (파일 없음): k_fear_greed_result_k100.csv"
          git diff --staged --quiet || git commit -m "K100지수 업데이트: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
