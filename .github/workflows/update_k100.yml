name: K100-탐욕공포지수 업데이트 (KOSPI100)

on:
  workflow_dispatch:   # 수동 실행 전용

permissions:
  contents: write

jobs:
  update-k100-index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Python 3.11 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: K100-탐욕공포지수 산출 (KOSPI100)
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python k_fear_greed_k100.py

      - name: CSV 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f "k_fear_greed_result_k100.csv" ] && git add "k_fear_greed_result_k100.csv" || echo "건너뜀 (파일 없음): k_fear_greed_result_k100.csv"
          git diff --staged --quiet || git commit -m "K100지수 업데이트: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
