name: K-탐욕공포지수 전체 업데이트 (K + K100)

on:
  schedule:
    - cron: '0 0 * * 2-6'   # 화~토 09:00 KST (UTC 00:00) — KRX API 익일 08:00 업데이트 기준
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Python 3.11 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: K-탐욕공포지수 산출 (KOSPI 전체)
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python k_fear_greed_index.py

      - name: K100-탐욕공포지수 산출 (KOSPI100)
        continue-on-error: true   # K100 실패해도 전체 워크플로우 성공으로 유지
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python k_fear_greed_k100.py

      - name: CSV 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in k_fear_greed_result.csv k_fear_greed_result_k100.csv k100_index_cache.csv pcr_raw_data.csv stock_market_data.csv; do
            [ -f "$f" ] && git add "$f" || echo "건너뜀 (파일 없음): $f"
          done
          git diff --staged --quiet || git commit -m "데이터 업데이트: $(TZ='Asia/Seoul' date +'%Y-%m-%d')"
          git pull --rebase origin $(git rev-parse --abbrev-ref HEAD)
          git push
