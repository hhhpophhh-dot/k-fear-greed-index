name: K-탐욕공포지수 업데이트 (KOSPI 전체)

on:
  workflow_dispatch:   # 수동 실행 전용

permissions:
  contents: write

jobs:
  update-k-index:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Python 3.11 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: K-탐욕공포지수 산출 (KOSPI 전체)
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python k_fear_greed_index.py

      - name: CSV 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in k_fear_greed_result.csv pcr_raw_data.csv; do
            [ -f "$f" ] && git add "$f" || echo "건너뜀 (파일 없음): $f"
          done
          git diff --staged --quiet || git commit -m "K지수 업데이트: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
